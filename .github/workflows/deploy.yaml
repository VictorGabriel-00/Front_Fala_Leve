name: CI/CD Pipeline FalaLeve

on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar o repositório
        uses: actions/checkout@v4

      - name: 🔑 Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. Constrói e envia a imagem do Frontend
      - name: 🐳 Build e Push do Frontend (React)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/falaleve-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.API_URL_PUBLICA }}

      # 2. Constrói e envia a imagem do Backend (Java)
      - name: 🐳 Build e Push do Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/falaleve-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Executar deploy no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }} 
          script: |
            # Ajuste para a pasta onde você colocar o projeto na AWS
            cd /var/app/falaleve
            
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            
            # Puxa as atualizações do git para garantir que o docker-compose.yml está atualizado
            git pull origin main
            
            # Derruba tudo o que está rodando atualmente
            docker compose down
            
            # Puxa as novas imagens do Docker Hub geradas por essa Action
            docker compose pull
            
            # Sobe os containers novamente
            docker compose up -d --force-recreate
            
            # Remove imagens antigas que não estão em uso para liberar espaço
            docker image prune -af