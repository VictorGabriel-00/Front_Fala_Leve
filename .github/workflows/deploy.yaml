name: CI/CD Pipeline FalaLeve

on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar o repositório
        uses: actions/checkout@v4

      - name: 🔑 Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Constrói e envia a imagem do Frontend
      - name: 🐳 Build e Push do Frontend (React)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/falaleve-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.API_URL_PUBLICA }}

      # 2. Constrói e envia a imagem do Backend (Java)
      - name: 🐳 Build e Push do Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/falaleve-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Executar deploy no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Ajuste para a pasta onde você colocar o projeto na AWS
            cd /var/www/falaleve
            docker compose pull
            docker compose up -d --remove-orphans